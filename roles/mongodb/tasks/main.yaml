- name: Copying mongodb repo file
  ansible.builtin.copy:
    src: mongodb.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Installing Mongodb
  ansible.builtin.dnf:
    name: mongodb-org
    state: present

- name: Starting and enabling mongodb service
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: yes

- name: Mongodb Configuration file change
  ansible.builtin.replace:
    path: /etc/mongod.conf
    regexp: "127.0.0.1"
    replace: "0.0.0.0"

- name: Restarting mongodb service
  ansible.builtin.service:
    name: mongod
    state: restarted
